<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Estaciones ADIF</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Consulta de salidas ADIF</h1>
    <div class="search-container">
      <input type="text" id="stationInput" placeholder="Introduce el nombre o código de estación..." autocomplete="off" />
      <button id="searchButton">Buscar</button>
      <div id="suggestions"></div>
    </div>
    <div id="warning" class="warning" style="display:none;">⚠️ ADIF no proporciona datos para esta estación.</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
