<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salidas de trenes ADIF</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Consulta de salidas de trenes</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Nombre o código de estación" autocomplete="off" />
      <div id="suggestions" class="suggestions"></div>
      <button onclick="buscarEstacion()">Buscar</button>
    </div>
    <div id="warningBanner" class="hidden">ADIF no proporciona datos para esta estación.</div>
    <iframe id="infoFrame" src="https://info.adif.es/?s=65300"></iframe>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
