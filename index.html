<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estaciones ADIF</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Salidas de trenes ADIF</h1>
    <div class="search-bar">
      <input type="text" id="stationInput" placeholder="Introduce nombre o código de estación..." />
      <button id="searchButton">Buscar</button>
      <div id="suggestions" class="suggestions"></div>
    </div>
    <div id="warning" class="warning" style="display: none;">⚠️ ADIF no proporciona datos para esta estación.</div>
    <iframe id="infoFrame" src="" frameborder="0"></iframe>
  </div>
  <script src="stations.js"></script>
  <script src="script.js"></script>
</body>
</html>
